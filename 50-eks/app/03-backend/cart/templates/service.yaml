apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: backend
    component: cart
  ports:
  - protocol: TCP
    port: 8080 # servie port
    targetPort: 8080 # container port